<div class="modal fade" id="modalNovoDocente" tabindex="-1" aria-labelledby="modalNovoDocenteLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg"> 
        <div class="modal-content shadow-lg border-dark rounded-4">
            
            <div class="modal-header bg-dark text-white rounded-top-4">
                <h5 class="modal-title w-100 text-center" id="modalNovoDocenteLabel">Cadastrar Novo Docente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            
            <div class="modal-body p-4">
                <form method="post" action="{% url 'cadastros:docente_criar' %}">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Nome<span class="text-danger">*</span></label>
                            <input type="text" name="nome" class="form-control border-dark" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Matrícula<span class="text-danger">*</span></label>
                            <input type="text" name="matricula" class="form-control border-dark" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Processo<span class="text-danger">*</span></label>
                            <input type="text" name="processo" class="form-control border-dark" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nível<span class="text-danger">*</span></label>
                            <input type="text" name="nivel" class="form-control border-dark" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Ano Avaliado<span class="text-danger">*</span></label>
                            <input type="date" name="ano_avaliado" class="form-control border-dark" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control border-dark">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Status<span class="text-danger">*</span></label>
                            <select name="status" class="form-select border-dark" required>
                                <option value="" disabled selected hidden>Selecione...</option>
                                {% for code, label in status_choices %}
                                    <option value="{{ code }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Suap</label>
                            <input type="url" name="suap" class="form-control border-dark">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Observações</label>
                            <textarea name="observacoes" class="form-control border-dark" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success fw-bold">Cadastrar Docente</button>
                        <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Cancelar</button>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
