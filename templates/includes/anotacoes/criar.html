<div class="modal fade" id="modalNovaAnotacao" tabindex="-1" aria-labelledby="modalNovaAnotacaoLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg"> 
        <div class="modal-content shadow-lg border-dark rounded-4">
            
            <div class="modal-header bg-dark text-white rounded-top-4">
                <h5 class="modal-title w-100 text-center" id="modalNovaAnotacaoLabel">Nova Anotação</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            
            <div class="modal-body p-4">
                <form method="post" action="{% url 'anotacoes:anotacao_criar' %}">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Título<span class="text-danger">*</span></label>
                            <input type="text" name="titulo" class="form-control border-dark" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Descrição<span class="text-danger">*</span></label>
                            <textarea name="descricao" class="form-control border-dark" rows="5" required></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Link</label>
                            <input type="url" name="link" class="form-control border-dark">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prazo</label>
                            <input type="date" name="prazo" class="form-control border-dark" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success fw-bold">Salvar Anotação</button>
                            <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
